name: iOS build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test SafePath iOS App
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Build Application
        run: |
          xcodebuild -project SafePath.xcodeproj \
                     -scheme SafePath \
                     -sdk iphonesimulator \
                     -destination "platform=iOS Simulator,name=iPhone 15,OS=18.0" \
                     clean build
